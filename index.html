<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skandan | Computing</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="animated-bg"></div>

    <nav class="top-nav">
        <a href="index.html" class="nav-link"><span class="nav-icon">🏠</span><span class="nav-label">Home</span></a>
        <a href="about.html" class="nav-link"><span class="nav-icon">🫵🏾</span><span class="nav-label">About</span></a>
        <a href="cyber.html" class="nav-link"><span class="nav-icon">🖥️</span><span class="nav-label">Cyber Projects</span></a>
        <a href="physical.html" class="nav-link"><span class="nav-icon">⚙️</span><span class="nav-label">Physical Builds</span></a>
        <a href="favourites.html" class="nav-link"><span class="nav-icon">💕</span><span class="nav-label">Favorites</span></a>
        <a href="bucketlist.html" class="nav-link"><span class="nav-icon">🪣</span><span class="nav-label">Bucketlist</span></a>
    </nav>

    <main class="content-grid">
        <div class="square-card">
            <div class="photo-container">
                <img src="Photography/IMG1.jpeg" alt="Build 1">
                <img src="Photography/IMG2.jpeg" alt="Build 2">
                <img src="Photography/IMG3.jpeg" alt="Build 3">
                <img src="Photography/IMG4.jpeg" alt="Build 4">
                <img src="Photography/IMG5.jpeg" alt="Build 5">
                <img src="Photography/IMG6.jpeg" alt="Build 6">
                <img src="Photography/IMG7.jpeg" alt="Build 7">
                <img src="Photography/IMG8.jpeg" alt="Build 8">
                <img src="Photography/IMG9.jpeg" alt="Build 9">
                <img src="Photography/IMG10.jpeg" alt="Build 10">
                <img src="Photography/IMG11.jpeg" alt="Build 11">
                <img src="Photography/IMG12.jpeg" alt="Build 12">
            </div>
        </div>

        <div class="clock-card">
            <h3 style="margin-top:0;">Local Time</h3>
            <div id="clock">00:00</div>
        </div>
    </main>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
